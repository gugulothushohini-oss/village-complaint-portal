<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <link rel="stylesheet" href="todo-style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>📝 My To-Do List</h1>
        <p>Organize your tasks and boost productivity</p>
    </header>

    <div class="input-section">
        <div class="input-wrapper">
            <input 
                type="text" 
                id="todoInput" 
                class="todo-input" 
                placeholder="Add a new task..."
                autocomplete="off"
            >
            <select id="prioritySelect" class="priority-select">
                <option value="low">Low Priority</option>
                <option value="medium" selected>Medium Priority</option>
                <option value="high">High Priority</option>
            </select>
            <button id="addBtn" class="add-btn">Add Task</button>
        </div>
        <div class="quick-actions">
            <button id="filterAll" class="filter-btn active">All</button>
            <button id="filterActive" class="filter-btn">Active</button>
            <button id="filterCompleted" class="filter-btn">Completed</button>
            <button id="clearCompleted" class="clear-btn">Clear Completed</button>
        </div>
    </div>

    <div class="stats-section">
        <div class="stat-item">
            <span class="stat-label">Total Tasks</span>
            <span id="totalTasks" class="stat-value">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Active</span>
            <span id="activeTasks" class="stat-value">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Completed</span>
            <span id="completedTasks" class="stat-value">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Completion Rate</span>
            <span id="completionRate" class="stat-value">0%</span>
        </div>
    </div>

    <div class="sort-section">
        <label for="sortSelect">Sort by:</label>
        <select id="sortSelect" class="sort-select">
            <option value="date-desc">Newest First</option>
            <option value="date-asc">Oldest First</option>
            <option value="priority">Priority (High to Low)</option>
            <option value="name">Alphabetical</option>
        </select>
    </div>

    <div id="todoList" class="todo-list">
        <!-- Tasks will be dynamically added here -->
    </div>

    <div id="emptyState" class="empty-state">
        <div class="empty-icon">✨</div>
        <h2>No tasks yet!</h2>
        <p>Add a task above to get started</p>
    </div>

    <div class="action-buttons">
        <button id="exportBtn" class="btn btn-export">📥 Export Tasks</button>
        <button id="importBtn" class="btn btn-import">📤 Import Tasks</button>
        <button id="resetBtn" class="btn btn-reset">🔄 Reset All</button>
    </div>

    <input type="file" id="importFile" class="hidden" accept=".json">
</div>

<footer>
    <p>To-Do List Application | Data saved locally © 2026</p>
</footer>

<script src="todo-script.js"></script>

</body>
</html>
